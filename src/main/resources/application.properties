# ── Server ──────────────────────────────────────────────────────────
# Railway injects PORT automatically; fallback to 8080 locally
server.port=${PORT:-8080}

# ── Database (Railway MySQL plugin injects these automatically) ──────
# Railway MySQL exposes: MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
spring.datasource.url=jdbc:mysql://${MYSQLHOST:${MYSQL_HOST:localhost}}:${MYSQLPORT:${MYSQL_PORT:3306}}/${MYSQLDATABASE:${MYSQL_DATABASE:bankingdb}}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:${MYSQL_USER:root}}
spring.datasource.password=${MYSQLPASSWORD:${MYSQL_PASSWORD:Admin1234}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP — wait up to 60 s for MySQL to become ready on Railway ─
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000
spring.datasource.hikari.maximum-pool-size=5

# ── JPA ─────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ─────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── SpringDoc ───────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Logging ─────────────────────────────────────────────────────────
logging.level.com.banking=INFO
logging.level.org.springframework.security=WARN
