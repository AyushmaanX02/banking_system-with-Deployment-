# ── Server ──────────────────────────────────────────────────────────
# Railway injects PORT automatically; fallback to 8080 locally
server.port=${PORT:8082}

# ── Database (Railway MySQL plugin injects these automatically) ──────
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:${MYSQLHOST:localhost}}:${MYSQL_PORT:${MYSQLPORT:3306}}/${MYSQL_DATABASE:${MYSQLDATABASE:bankingdb}}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:${MYSQLUSER:root}}
spring.datasource.password=${MYSQL_PASSWORD:${MYSQLPASSWORD:Admin1234}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ─────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ─────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── SpringDoc ───────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Logging ─────────────────────────────────────────────────────────
logging.level.com.banking=INFO
logging.level.org.springframework.security=WARN
