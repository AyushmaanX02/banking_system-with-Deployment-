<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexBank — Modern Banking</title>
  <meta name="description" content="NexBank: Secure, modern online banking for your everyday financial needs." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        hsl(222, 15%, 10%);
      --surface:   hsl(222, 13%, 15%);
      --surface2:  hsl(222, 12%, 19%);
      --border:    hsl(222, 10%, 25%);
      --accent:    hsl(170, 65%, 42%);
      --accent-h:  hsl(170, 65%, 50%);
      --accent-d:  hsl(170, 60%, 34%);
      --danger:    hsl(0, 68%, 55%);
      --warn:      hsl(38, 92%, 55%);
      --success:   hsl(145, 55%, 45%);
      --text:      hsl(220, 15%, 92%);
      --text-muted:hsl(220, 10%, 55%);
      --radius:    12px;
      --radius-sm: 8px;
      --shadow:    0 4px 24px rgba(0,0,0,0.4);
      --transition:0.22s ease;
    }

    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Layout ── */
    #shell { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px; min-width: 240px; background: var(--surface);
      display: flex; flex-direction: column; border-right: 1px solid var(--border);
      transition: transform var(--transition);
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 24px 20px 20px; border-bottom: 1px solid var(--border);
    }
    .brand-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), hsl(200,65%,40%));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; color: #fff; flex-shrink: 0;
    }
    .brand-name { font-size: 1.2rem; font-weight: 700; color: var(--text); }
    .brand-name span { color: var(--accent); }

    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: var(--radius-sm);
      color: var(--text-muted); font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition); border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: hsl(170,65%,42%,15%); color: var(--accent); }
    .nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-divider { height: 1px; background: var(--border); margin: 8px 0; }
    .nav-section-label { padding: 4px 14px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-top: 8px; }

    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
    .user-pill {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--surface2); cursor: pointer;
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-d), hsl(200,65%,35%));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0;
    }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 0.7rem; color: var(--text-muted); }
    .logout-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; transition: color var(--transition); }
    .logout-btn:hover { color: var(--danger); }

    /* ── Main content ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #topbar {
      height: 60px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; border-bottom: 1px solid var(--border); background: var(--surface);
      flex-shrink: 0;
    }
    .topbar-title { font-size: 1.05rem; font-weight: 600; }
    .topbar-actions { display: flex; align-items: center; gap: 12px; }
    .badge {
      display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-success { background: hsl(145,55%,45%,20%); color: var(--success); }
    .badge-danger  { background: hsl(0,68%,55%,20%);  color: var(--danger); }
    .badge-warn    { background: hsl(38,92%,55%,20%);  color: var(--warn); }
    .badge-accent  { background: hsl(170,65%,42%,20%); color: var(--accent); }

    #content { flex: 1; overflow-y: auto; padding: 28px; }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
    }
    .card-sm { padding: 18px; }
    .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 16px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.78rem; }

    /* ── Grid ── */
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    @media(max-width: 900px) { .grid-4,.grid-3 { grid-template-columns: repeat(2,1fr); } }
    @media(max-width: 600px) { .grid-4,.grid-3,.grid-2 { grid-template-columns: 1fr; } #sidebar { display: none; } }

    /* ── Stat cards ── */
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      display: flex; flex-direction: column; gap: 8px;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .stat-icon { font-size: 1.4rem; margin-bottom: 4px; }
    .stat-value { font-size: 1.8rem; font-weight: 700; }
    .stat-label { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; }
    .stat-accent  .stat-value { color: var(--accent); }
    .stat-success .stat-value { color: var(--success); }
    .stat-warn    .stat-value { color: var(--warn); }
    .stat-danger  .stat-value { color: var(--danger); }

    /* ── Forms ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-label { font-size: 0.82rem; font-weight: 500; color: var(--text-muted); }
    .form-input, .form-select, .form-textarea {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 14px; color: var(--text); font-size: 0.9rem; font-family: inherit;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none; width: 100%;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px hsl(170,65%,42%,15%);
    }
    .form-select option { background: var(--surface2); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 20px; border-radius: var(--radius-sm); font-size: 0.88rem;
      font-weight: 600; cursor: pointer; border: none; transition: all var(--transition);
      font-family: inherit; text-decoration: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); box-shadow: 0 4px 16px hsl(170,65%,42%,40%); }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-danger:hover  { background: hsl(0,68%,62%); }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover   { background: var(--border); }
    .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: 0.5; pointer-events: none; }

    /* ── Auth screen ── */
    #auth-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 20% 50%, hsl(170,65%,15%,0.4) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, hsl(200,65%,15%,0.3) 0%, transparent 50%);
    }
    .auth-box {
      width: 100%; max-width: 420px; padding: 20px;
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px; box-shadow: var(--shadow);
    }
    .auth-logo {
      display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
    }
    .auth-logo-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), hsl(200,65%,40%));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 22px; color: #fff;
    }
    .auth-logo-text { font-size: 1.5rem; font-weight: 700; }
    .auth-logo-text span { color: var(--accent); }
    .auth-title { font-size: 1.35rem; font-weight: 700; margin-bottom: 6px; }
    .auth-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 28px; }
    .auth-switch { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }
    .auth-switch a { color: var(--accent); text-decoration: none; font-weight: 500; cursor: pointer; }
    .auth-switch a:hover { text-decoration: underline; }

    /* ── Account cards ── */
    .account-card {
      background: linear-gradient(135deg, var(--surface2), var(--surface));
      border: 1px solid var(--border); border-radius: var(--radius); padding: 22px;
      transition: transform var(--transition), box-shadow var(--transition);
      cursor: pointer; position: relative; overflow: hidden;
    }
    .account-card::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 120px; height: 120px; border-radius: 50%;
      background: hsl(170,65%,42%,10%);
    }
    .account-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .account-card.savings  { border-top: 3px solid var(--accent); }
    .account-card.current  { border-top: 3px solid var(--warn); }
    .account-card.fixed    { border-top: 3px solid hsl(270,65%,55%); }
    .account-num { font-size: 0.75rem; color: var(--text-muted); font-family: monospace; margin-bottom: 10px; }
    .account-balance { font-size: 1.9rem; font-weight: 700; margin-bottom: 4px; }
    .account-type-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* ── Table ── */
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { padding: 10px 14px; text-align: left; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 12px 14px; border-bottom: 1px solid hsl(222,10%,18%); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .amount-positive { color: var(--success); font-weight: 600; }
    .amount-negative { color: var(--danger); font-weight: 600; }
    .mono { font-family: monospace; font-size: 0.82rem; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid hsl(170,65%,42%,30%); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

    /* ── Toast ── */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 18px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: var(--shadow); font-size: 0.875rem; font-weight: 500;
      animation: slideIn 0.3s ease; min-width: 280px; max-width: 380px;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { to { opacity: 0; transform: translateX(100%); } }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--accent); }
    .toast-icon { font-size: 1.1rem; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      backdrop-filter: blur(4px);
      animation: fadein 0.2s ease;
    }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; width: 100%; max-width: 480px;
      box-shadow: var(--shadow); animation: modalIn 0.25s ease;
    }
    @keyframes modalIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-title { font-size: 1.1rem; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    /* ── Tab bar ── */
    .tab-bar { display: flex; gap: 2px; background: var(--surface2); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 20px; }
    .tab-btn {
      flex: 1; padding: 8px 16px; border-radius: 6px; border: none; background: none;
      color: var(--text-muted); font-size: 0.85rem; font-weight: 500; cursor: pointer;
      transition: all var(--transition); font-family: inherit;
    }
    .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

    /* ── Section header ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 1.15rem; font-weight: 700; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
    .empty-state p { font-size: 0.9rem; }

    /* ── Util ── */
    .flex { display: flex; } .items-center { align-items: center; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; }
    .mt-4 { margin-top: 16px; } .mb-4 { margin-bottom: 16px; }
    .text-muted { color: var(--text-muted); font-size: 0.85rem; }
    .hidden { display: none !important; }
    .page { display: flex; flex-direction: column; gap: 20px; }

    /* ── Fade in animation on page render ── */
    @keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .page-anim { animation: pageIn 0.3s ease; }

    /* ── Beneficiary chip ── */
    .bene-card {
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .bene-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-d), hsl(200,60%,35%));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0;
    }
    .bene-info .bene-name { font-weight: 600; font-size: 0.9rem; }
    .bene-info .bene-meta { font-size: 0.78rem; color: var(--text-muted); }

    /* ── Progress bar (for account fill) ── */
    .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.6s ease; }

    /* Transfer step indicator */
    .transfer-type-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .transfer-type-btn {
      padding: 12px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-muted); cursor: pointer; text-align: center;
      font-size: 0.82rem; font-weight: 500; transition: all var(--transition); font-family: inherit;
    }
    .transfer-type-btn.active { border-color: var(--accent); color: var(--accent); background: hsl(170,65%,42%,10%); }
    .transfer-type-btn .t-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Auth screen -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">N</div>
        <div class="auth-logo-text">Nex<span>Bank</span></div>
      </div>

      <!-- LOGIN form -->
      <div id="login-panel">
        <div class="auth-title">Welcome back</div>
        <div class="auth-sub">Sign in to manage your accounts</div>
        <form id="login-form" autocomplete="on">
          <div class="form-group">
            <label class="form-label" for="login-email">Email address</label>
            <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input class="form-input" type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
        </form>
        <div class="auth-switch">Don't have an account? <a onclick="showRegister()">Create one</a></div>
      </div>

      <!-- REGISTER form -->
      <div id="register-panel" class="hidden">
        <div class="auth-title">Create account</div>
        <div class="auth-sub">Join NexBank — free &amp; instant</div>
        <form id="register-form" autocomplete="on">
          <div class="form-group">
            <label class="form-label" for="reg-name">Full name</label>
            <input class="form-input" type="text" id="reg-name" placeholder="Jane Smith" required autocomplete="name" />
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">Email address</label>
            <input class="form-input" type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-phone">Phone (optional)</label>
            <input class="form-input" type="tel" id="reg-phone" placeholder="+91 98765 43210" autocomplete="tel" />
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-pass">Password</label>
            <input class="form-input" type="password" id="reg-pass" placeholder="Min 8 characters" required autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="register-btn">Create Account</button>
        </form>
        <div class="auth-switch">Already have an account? <a onclick="showLogin()">Sign in</a></div>
      </div>
    </div>
  </div>
</div>

<!-- App shell (hidden until logged in) -->
<div id="shell" class="hidden">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">N</div>
      <div class="brand-name">Nex<span>Bank</span></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav">
      <span class="nav-section-label">Overview</span>
      <button class="nav-item active" onclick="navigate('dashboard')" data-page="dashboard">
        <span class="icon">🏠</span> Dashboard
      </button>
      <span class="nav-section-label">Banking</span>
      <button class="nav-item" onclick="navigate('accounts')" data-page="accounts">
        <span class="icon">💳</span> Accounts
      </button>
      <button class="nav-item" onclick="navigate('transactions')" data-page="transactions">
        <span class="icon">↔️</span> Transactions
      </button>
      <button class="nav-item" onclick="navigate('beneficiaries')" data-page="beneficiaries">
        <span class="icon">👥</span> Beneficiaries
      </button>
      <div id="admin-nav-section" class="hidden">
        <div class="nav-divider"></div>
        <span class="nav-section-label">Admin</span>
        <button class="nav-item" onclick="navigate('admin-dashboard')" data-page="admin-dashboard">
          <span class="icon">📊</span> Admin Dashboard
        </button>
        <button class="nav-item" onclick="navigate('admin-users')" data-page="admin-users">
          <span class="icon">🧑‍💼</span> Manage Users
        </button>
        <button class="nav-item" onclick="navigate('admin-transactions')" data-page="admin-transactions">
          <span class="icon">📋</span> All Transactions
        </button>
        <button class="nav-item" onclick="navigate('admin-audit')" data-page="admin-audit">
          <span class="icon">🔍</span> Audit Logs
        </button>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-avatar" id="user-avatar">U</div>
        <div class="user-info">
          <div class="user-name" id="user-display-name">User</div>
          <div class="user-role" id="user-display-role">Customer</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Logout">⏻</button>
      </div>
    </div>
  </nav>

  <!-- Main content -->

<script>
// ─── State ───────────────────────────────────────────────
let TOKEN = null;
let USER  = null;  // { email, role, fullName }

// ─── Auth helpers ─────────────────────────────────────────
function saveAuth(token) {
  TOKEN = token;
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    USER = {
      email:    payload.sub || payload.email || '',
      role:     payload.role || payload.authorities || 'CUSTOMER',
      fullName: payload.fullName || payload.name || payload.sub || 'User'
    };
    // role might be array or string
    if (Array.isArray(USER.role)) USER.role = USER.role[0] || 'CUSTOMER';
    USER.role = USER.role.replace('ROLE_','');
  } catch(e) { USER = { email: '', role: 'CUSTOMER', fullName: 'User' }; }
  localStorage.setItem('nexbank_token', token);
}
function loadAuth() {
  const t = localStorage.getItem('nexbank_token');
  if (t) { try { saveAuth(t); return true; } catch(e) {} }
  return false;
}
function logout() {
  TOKEN = null; USER = null;
  localStorage.removeItem('nexbank_token');
  showAuthScreen();
}

// ─── API ──────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const headers = {'Content-Type':'application/json'};
  if (TOKEN) headers['Authorization'] = `Bearer ${TOKEN}`;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (res.status === 204) return null;
  const text = await res.text();
  let json;
  try { json = JSON.parse(text); } catch(e) { json = text; }
  if (!res.ok) {
    const msg = (json && (json.message || json.error)) || text || res.statusText;
    throw new Error(msg);
  }
  return json;
}

// ─── Toast ────────────────────────────────────────────────
function toast(msg, type='info') {
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.style.animation='fadeOut 0.3s ease forwards'; setTimeout(()=>el.remove(),300); }, 3500);
}

// ─── Modal ────────────────────────────────────────────────
function openModal(title, bodyHTML, footerHTML='') {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'active-modal';
  overlay.onclick = (e) => { if(e.target===overlay) closeModal(); };
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">${title}</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body">${bodyHTML}</div>
      ${footerHTML ? `<div class="modal-footer">${footerHTML}</div>` : ''}
    </div>`;
  document.body.appendChild(overlay);
}
function closeModal() { document.getElementById('active-modal')?.remove(); }

// ─── Spinner btn ──────────────────────────────────────────
function setBtnLoading(btn, loading, text='') {
  if(loading) { btn.disabled=true; btn.dataset.orig=btn.innerHTML; btn.innerHTML=`<span class="spinner"></span>`; }
  else { btn.disabled=false; btn.innerHTML=btn.dataset.orig||text; }
}

// ─── Auth screen ──────────────────────────────────────────
function showAuthScreen() {
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('shell').classList.add('hidden');
}
function showLogin()    { document.getElementById('login-panel').classList.remove('hidden'); document.getElementById('register-panel').classList.add('hidden'); }
function showRegister() { document.getElementById('register-panel').classList.remove('hidden'); document.getElementById('login-panel').classList.add('hidden'); }

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  setBtnLoading(btn, true);
  try {
    const res = await api('/api/auth/login', 'POST', {
      email: document.getElementById('login-email').value.trim(),
      password: document.getElementById('login-password').value
    });
    saveAuth(res.token);
    enterApp();
  } catch(err) { toast(err.message, 'error'); } finally { setBtnLoading(btn, false); }
});

document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('register-btn');
  setBtnLoading(btn, true);
  try {
    const res = await api('/api/auth/register', 'POST', {
      fullName: document.getElementById('reg-name').value.trim(),
      email:    document.getElementById('reg-email').value.trim(),
      phone:    document.getElementById('reg-phone').value.trim() || null,
      password: document.getElementById('reg-pass').value
    });
    saveAuth(res.token);
    enterApp();
  } catch(err) { toast(err.message, 'error'); } finally { setBtnLoading(btn, false); }
});

// ─── Enter app ────────────────────────────────────────────
function enterApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('shell').classList.remove('hidden');
  // Update user pill
  const initials = (USER.fullName||USER.email||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-display-name').textContent = USER.fullName || USER.email;
  document.getElementById('user-display-role').textContent = USER.role;
  // Show admin nav if admin
  if (USER.role === 'ADMIN') document.getElementById('admin-nav-section').classList.remove('hidden');
  navigate('dashboard');
}

// ─── Router ───────────────────────────────────────────────
function navigate(page) {
  // Update nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  window.location.hash = page;
  renderPage(page);
}

function renderPage(page) {
  const content = document.getElementById('content');
  const title = document.getElementById('page-title');
  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = '';
  content.innerHTML = `<div style="display:flex;justify-content:center;padding:60px"><span class="spinner" style="width:32px;height:32px;border-width:3px"></span></div>`;

  const pages = {
    'dashboard':           [renderDashboard,       'Dashboard'],
    'accounts':            [renderAccounts,         'My Accounts'],
    'transactions':        [renderTransactions,     'Transactions'],
    'beneficiaries':       [renderBeneficiaries,    'Beneficiaries'],
    'admin-dashboard':     [renderAdminDashboard,   'Admin Dashboard'],
    'admin-users':         [renderAdminUsers,       'Manage Users'],
    'admin-transactions':  [renderAdminTransactions,'All Transactions'],
    'admin-audit':         [renderAdminAudit,       'Audit Logs'],
  };
  if (pages[page]) {
    title.textContent = pages[page][1];
    pages[page][0](content, actions);
  } else {
    content.innerHTML = `<div class="card"><h2>Page not found</h2></div>`;
  }
}

let txAccounts = [];
let currentTxType = 'deposit';

async function renderTransactions(content, actions) {
  actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openTxModal('deposit')">➕ New Transaction</button>`;
  try {

              <option value="">-- Select Account --</option>
              ${txAccounts.map(a=>`<option value="${a.accountNumber}">${a.accountType} · ${a.accountNumber}</option>`).join('')}
            </select>
          </div>
        </div>
        <div id="history-body">${emptyState('📋','Select an account to view history.')}</div>
      </div>
    </div>`;
  } catch(err) { content.innerHTML = errorCard(err.message); }
}

async function loadHistory() {
  const accNum = document.getElementById('hist-acc-sel').value;
  const body = document.getElementById('history-body');
  if (!accNum) return;
  body.innerHTML = `<div style="text-align:center;padding:24px"><span class="spinner"></span></div>`;
  try {
    const txns = await api(`/api/transactions/history/${accNum}`);
    if (!txns.length) { body.innerHTML = emptyState('📋','No transactions yet.'); return; }
    body.innerHTML = `<div class="table-wrapper"><table>
      <thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Reference</th><th>Amount</th><th>Balance After</th></tr></thead>
      <tbody>
        ${txns.map(t=>`<tr>
          <td>${fmtDate(t.createdAt)}</td>
          <td><span class="badge ${txTypeBadge(t.transactionType)}">${t.transactionType}</span></td>
          <td class="text-muted">${t.description||'—'}</td>
          <td class="mono">${t.referenceNumber}</td>
          <td class="${t.transactionType==='DEPOSIT'?'amount-positive':'amount-negative'}">${t.transactionType==='DEPOSIT'?'+':'−'}${fmt(t.amount)}</td>
          <td>${fmt(t.balanceAfter)}</td>
        </tr>`).join('')}
      </tbody></table></div>`;
  } catch(err) { body.innerHTML = errorCard(err.message); toast(err.message,'error'); }
}

function openTxModal(type) {
  currentTxType = type;
  const accOptions = txAccounts.map(a=>`<option value="${a.accountNumber}">${a.accountType} · ${a.accountNumber}</option>`).join('');
  openModal('New Transaction', `
    <div class="transfer-type-row">
      <button class="transfer-type-btn ${type==='deposit'?'active':''}" onclick="switchTxType('deposit',this)"><span class="t-icon">💸</span>Deposit</button>
      <button class="transfer-type-btn ${type==='withdraw'?'active':''}" onclick="switchTxType('withdraw',this)"><span class="t-icon">📤</span>Withdraw</button>
      <button class="transfer-type-btn ${type==='transfer'?'active':''}" onclick="switchTxType('transfer',this)"><span class="t-icon">↔️</span>Transfer</button>
    </div>
    <form id="tx-form">
      <div class="form-group">
        <label class="form-label">From Account</label>
        <select class="form-select" id="tx-from-acc" required><option value="">-- Select --</option>${accOptions}</select>
      </div>
      <div id="tx-to-acc-group" class="${type!=='transfer'?'hidden':''}">
        <div class="form-group">
          <label class="form-label">To Account Number</label>
          <input class="form-input" type="text" id="tx-to-acc" placeholder="Destination account number" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Amount (₹)</label>
        <input class="form-input" type="number" id="tx-amount" min="1" step="0.01" placeholder="0.00" required />
      </div>
      <div class="form-group">
        <label class="form-label">Description (optional)</label>
        <input class="form-input" type="text" id="tx-desc" placeholder="e.g. Rent payment" />
      </div>
    </form>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" id="tx-submit-btn" onclick="submitTransaction()">Submit</button>`
  );
}

function switchTxType(type, el) {
  currentTxType = type;
  document.querySelectorAll('.transfer-type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const toGrp = document.getElementById('tx-to-acc-group');
  toGrp.classList.toggle('hidden', type !== 'transfer');
}

async function submitTransaction() {
  const btn = document.getElementById('tx-submit-btn');
  setBtnLoading(btn, true);
  const fromAcc = document.getElementById('tx-from-acc').value;
  const amount  = parseFloat(document.getElementById('tx-amount').value);
  const desc    = document.getElementById('tx-desc').value.trim();
  if (!fromAcc || !amount) { toast('Please fill all required fields','error'); setBtnLoading(btn,false); return; }
  try {
    let res;
    if (currentTxType === 'deposit') {
      res = await api('/api/transactions/deposit','POST',{accountNumber:fromAcc,amount,description:desc||null});
    } else if (currentTxType === 'withdraw') {
      res = await api('/api/transactions/withdraw','POST',{accountNumber:fromAcc,amount,description:desc||null});
    } else {
      const toAcc = document.getElementById('tx-to-acc').value.trim();
      if (!toAcc) { toast('Please enter destination account','error'); setBtnLoading(btn,false); return; }
      res = await api('/api/transactions/transfer','POST',{fromAccountNumber:fromAcc,toAccountNumber:toAcc,amount,description:desc||null});
    }
    toast(`Transaction successful! Ref: ${res.referenceNumber}`,'success');
    closeModal();
    // Reload txAccounts and history
    txAccounts = await api('/api/accounts');
    const sel = document.getElementById('hist-acc-sel');
    if (sel) { sel.options[0].text = '-- Select Account --'; txAccounts.forEach(a => { if (![...sel.options].find(o=>o.value===a.accountNumber)) { const o=document.createElement('option'); o.value=a.accountNumber; o.text=`${a.accountType} · ${a.accountNumber}`; sel.appendChild(o); } }); if (sel.value) loadHistory(); }
  } catch(err) { toast(err.message,'error'); } finally { setBtnLoading(btn,false); }
}

      </div>
      <div class="card">
        <div class="card-title">System Health</div>
        <div class="grid-2">
          <div>
            <div class="text-muted mb-4">Active Accounts</div>
            <div style="font-size:1.3rem;font-weight:700;color:var(--success)">${stats.activeAccounts||0}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${stats.totalAccounts?Math.round((stats.activeAccounts/stats.totalAccounts)*100):0}%"></div></div>
          </div>
          <div>
            <div class="text-muted mb-4">Frozen Accounts</div>
            <div style="font-size:1.3rem;font-weight:700;color:var(--danger)">${stats.frozenAccounts||0}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${stats.totalAccounts?Math.round((stats.frozenAccounts/stats.totalAccounts)*100):0}%;background:var(--danger)"></div></div>
          </div>
        </div>
      </div>
    </div>`;
  } catch(err) { content.innerHTML = errorCard(err.message); }
}

// ─────────────────────────────────────────────────────────
// PAGE: ADMIN USERS
// ─────────────────────────────────────────────────────────
async function renderAdminUsers(content) {
  try {
    const users = await api('/api/admin/users');
    content.innerHTML = `<div class="page page-anim">
      <div class="card">
        <div class="card-title">All Users (${users.length})</div>
        <div class="table-wrapper"><table>
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Accounts</th><th>Actions</th></tr></thead>
          <tbody>
            ${users.map(u=>`<tr>
              <td><strong>${u.fullName||u.email}</strong></td>
              <td class="mono text-muted">${u.email}</td>
              <td><span class="badge ${u.role==='ADMIN'?'badge-warn':'badge-accent'}">${u.role}</span></td>
              <td>${(u.accounts||[]).length}</td>
              <td>
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                  ${(u.accounts||[]).map(a=>`
                    ${a.status==='FROZEN'
                      ? `<button class="btn btn-ghost btn-sm" onclick="unfreezeAcc('${a.accountNumber}')">🔓 ${a.accountNumber.slice(-4)}</button>`
                      : `<button class="btn btn-danger btn-sm" onclick="freezeAcc('${a.accountNumber}')">🔒 ${a.accountNumber.slice(-4)}</button>`
                    }`).join('')}
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table></div>
      </div>
    </div>`;
  } catch(err) { content.innerHTML = errorCard(err.message); }
}

async function freezeAcc(num) {
  try { await api(`/api/admin/accounts/${num}/freeze`,'PUT'); toast('Account frozen','success'); navigate('admin-users'); }
  catch(err) { toast(err.message,'error'); }
}
async function unfreezeAcc(num) {
  try { await api(`/api/admin/accounts/${num}/unfreeze`,'PUT'); toast('Account unfrozen','success'); navigate('admin-users'); }
  catch(err) { toast(err.message,'error'); }
}

// ─────────────────────────────────────────────────────────
// PAGE: ADMIN ALL TRANSACTIONS
// ─────────────────────────────────────────────────────────
async function renderAdminTransactions(content) {
  try {
    const txns = await api('/api/admin/transactions');
    content.innerHTML = `<div class="page page-anim">
      <div class="card">
        <div class="card-title">All Transactions (${txns.length})</div>
        ${txns.length===0 ? emptyState('📋','No transactions.') : `
        <div class="table-wrapper"><table>
          <thead><tr><th>Date</th><th>Type</th><th>Account</th><th>Amount</th><th>Balance After</th><th>Description</th></tr></thead>
          <tbody>
            ${txns.map(t=>`<tr>
              <td>${fmtDate(t.createdAt)}</td>
              <td><span class="badge ${txTypeBadge(t.transactionType)}">${t.transactionType}</span></td>
              <td class="mono">${t.accountNumber||'—'}</td>
              <td class="${t.transactionType==='DEPOSIT'?'amount-positive':'amount-negative'}">${t.transactionType==='DEPOSIT'?'+':'−'}${fmt(t.amount)}</td>
              <td>${fmt(t.balanceAfter)}</td>
              <td class="text-muted">${t.description||'—'}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>`}
      </div>
    </div>`;
  } catch(err) { content.innerHTML = errorCard(err.message); }

// PAGE: AUDIT LOGS
// ─────────────────────────────────────────────────────────
async function renderAdminAudit(content) {

              <td>${l.entity||'—'}</td>
              <td class="text-muted">${l.details||'—'}</td>
              <td class="mono text-muted">${l.ipAddress||'—'}</td>

// ─────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────
function fmt(n) {
  return new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR',maximumFractionDigits:2}).format(n||0);
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function statusBadge(s) {
  return s==='ACTIVE'?'badge-success':s==='FROZEN'?'badge-warn':'badge-danger';
}
function txTypeBadge(t) {
  return t==='DEPOSIT'?'badge-success':t==='WITHDRAWAL'?'badge-danger':'badge-accent';
}
function accountCardHTML(a) {
  return `<div class="account-card ${a.accountType.toLowerCase()}" onclick="viewAccount('${a.accountNumber}')">
    <div class="account-num">ACC · ${a.accountNumber}</div>
    <div class="account-balance">${fmt(a.balance)}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
      <div class="account-type-label">${a.accountType}</div>
      <span class="badge ${statusBadge(a.status)}">${a.status}</span>
    </div>
  </div>`;
}
function emptyState(icon, msg) {
  return `<div class="empty-state"><div class="empty-icon">${icon}</div><p>${msg}</p></div>`;
}
function errorCard(msg) {
  return `<div class="card"><div style="color:var(--danger);font-weight:600">⚠️ Error</div><p class="text-muted" style="margin-top:8px">${msg}</p></div>`;
}
